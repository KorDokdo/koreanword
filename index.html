<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한글 맞추기</title>
    <style>
        :root {
            --color-correct: #6aaa64;
            --color-present: #c9b458;
            --color-absent: #787c7e;
            --color-border: #d3d6da;
            --color-text: #1a1a1a;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #ffffff;
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            align-items:center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h1 { margin-bottom: 30px; }

        #board {
            display: grid;
            grid-template-rows: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        .tile {
            width: 60px;
            height: 60px;
            border: 2px solid var(--color-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        .tile[data-state="correct"] {
            background-color: var(--color-correct);
            border-color: var(--color-correct);
            color: white;
        }

        .tile[data-state="present"] {
            background-color: var(--color-present);
            border-color: var(--color-present);
            color: white;
        }

        .tile[data-state="absent"] {
            background-color: var(--color-absent);
            border-color: var(--color-absent);
            color: white;
        }

        #keyboard {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-width: 500px;
            width: 100%;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 5px;
            width: 100%;
        }

        .key {
            flex: 1;
            max-width: 46px;
            background-color: #d3d6da;
            border: 0;
            border-radius: 4px;
            padding: 15px 5px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        .key:hover { background-color: #bbb; }

        .key.wide {
            flex: 1.5;
            max-width: 70px;
            font-size: 1rem;
        }

        #message {
            height: 30px;
            margin: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <h1>한글 맞추기</h1>
    <div id="board"></div>
    <div id="message"></div>
    <div id="keyboard"></div>

    <script>
        const JAMO_MAP = {
            'ㅔ': ['ㅓ', 'ㅣ'],
            'ㅐ': ['ㅏ', 'ㅣ'],
            'ㅖ': ['ㅕ', 'ㅣ'],
            'ㅒ': ['ㅑ', 'ㅣ'],
            'ㅘ': ['ㅗ', 'ㅏ'],
            'ㅙ': ['ㅗ', 'ㅏ', 'ㅣ'],
            'ㅚ': ['ㅗ', 'ㅣ'],
            'ㅝ': ['ㅜ', 'ㅓ'],
            'ㅞ': ['ㅜ', 'ㅓ', 'ㅣ'],
            'ㅟ': ['ㅜ', 'ㅣ'],
            'ㅢ': ['ㅡ', 'ㅣ'],
            'ㄲ': ['ㄱ', 'ㄱ'],
            'ㄸ': ['ㄷ', 'ㄷ'],
            'ㅃ': ['ㅂ', 'ㅂ'],
            'ㅆ': ['ㅅ', 'ㅅ'],
            'ㅉ': ['ㅈ', 'ㅈ'],
            'ㄳ': ['ㄱ', 'ㅅ'],
            'ㄵ': ['ㄴ', 'ㅈ'],
            'ㄶ': ['ㄴ', 'ㅎ'],
            'ㄺ': ['ㄹ', 'ㄱ'],
            'ㄻ': ['ㄹ', 'ㅁ'],
            'ㄼ': ['ㄹ', 'ㅂ'],
            'ㄽ': ['ㄹ', 'ㅅ'],
            'ㄾ': ['ㄹ', 'ㅌ'],
            'ㄿ': ['ㄹ', 'ㅍ'],
            'ㅀ': ['ㄹ', 'ㅎ'],
            'ㅄ': ['ㅂ', 'ㅅ']
        };

        const CHOSEONG = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
        const JUNGSEONG = ['ㅏ', 'ㅐ', 'ㅑ', 'ㅒ', 'ㅓ', 'ㅔ', 'ㅕ', 'ㅖ', 'ㅗ', 'ㅘ', 'ㅙ', 'ㅚ', 'ㅛ', 'ㅜ', 'ㅝ', 'ㅞ', 'ㅟ', 'ㅠ', 'ㅡ', 'ㅢ', 'ㅣ'];
        const JONGSEONG = ['', 'ㄱ', 'ㄲ', 'ㄳ', 'ㄴ', 'ㄵ', 'ㄶ', 'ㄷ', 'ㄹ', 'ㄺ', 'ㄻ', 'ㄼ', 'ㄽ', 'ㄾ', 'ㄿ', 'ㅀ', 'ㅁ', 'ㅂ', 'ㅄ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

        function disassemble(str) {
            let result = [];
            for (let char of str) {
                const code = char.charCodeAt(0) - 44032;
                if (code < 0 || code > 11171) {
                    result.push(char);
                    continue;
                }
                const cho = Math.floor(code / 588);
                const jung = Math.floor((code % 588) / 28);
                const jong = code % 28;

                const parts = [CHOSEONG[cho], JUNGSEONG[jung], JONGSEONG[jong]].filter(p => p !== '');
                
                for (let p of parts) {
                    if (JAMO_MAP[p]) {
                        result.push(...JAMO_MAP[p]);
                    } else {
                        result.push(p);
                    }
                }
            }
            return result;
        }

        let targetWord = "";
        let targetJamos = [];
        let validGuessJamos = new Set();
        let guesses = [];
        let currentGuess = [];
        let gameOver = false;

        const boardElement = document.getElementById('board');
        const keyboardElement = document.getElementById('keyboard');
        const messageElement = document.getElementById('message');

        async function init() {
            try {
                messageElement.innerText = "단어 목록을 불러오는 중...";
                const response = await fetch('data/valid-words-5jamo.json');
                if (!response.ok) {
                    throw new Error("단어 목록을 불러오지 못했습니다.");
                }
                const data = await response.json();

                const entries = data.entries || [];
                if (entries.length === 0) {
                    throw new Error("사용 가능한 단어가 없습니다.");
                }
                validGuessJamos = new Set(entries.map(entry => entry.jamo));

                const targetEntry = entries[Math.floor(Math.random() * entries.length)];
                targetWord = targetEntry.words[Math.floor(Math.random() * targetEntry.words.length)];

                targetJamos = disassemble(targetWord);
                console.log("Target:", targetWord, targetJamos);

                messageElement.innerText = "";
                createBoard();
                createKeyboard();
                
                window.addEventListener('keydown', handleKeyDown);
            } catch (e) {
                console.error(e);
                messageElement.innerText = "단어를 불러오지 못했습니다.";
            }
        }

        function createBoard() {
            for (let i = 0; i < 5; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.id = `tile-${i}-${j}`;
                    row.appendChild(tile);
                }
                boardElement.appendChild(row);
            }
        }

        function createKeyboard() {
            const rows = [
                ['ㅂ', 'ㅈ', 'ㄷ', 'ㄱ', 'ㅅ', 'ㅛ', 'ㅕ', 'ㅑ', 'ㅐ', 'ㅔ'],
                ['ㅁ', 'ㄴ', 'ㅇ', 'ㄹ', 'ㅎ', 'ㅗ', 'ㅓ', 'ㅏ', 'ㅣ'],
                ['Enter', 'ㅋ', 'ㅌ', 'ㅊ', 'ㅍ', 'ㅠ', 'ㅜ', 'ㅡ', 'Back']
            ];

            rows.forEach(keys => {
                const row = document.createElement('div');
                row.className = 'keyboard-row';
                keys.forEach(k => {
                    const button = document.createElement('button');
                    button.innerText = k;
                    button.className = 'key';
                    if (k === 'Enter' || k === 'Back') button.classList.add('wide');
                    button.onclick = () => handleKey(k);
                    row.appendChild(button);
                });
                keyboardElement.appendChild(row);
            });
        }

        function handleKeyDown(e) {
            if (gameOver) return;
            if (e.key === 'Enter') handleKey('Enter');
            else if (e.key === 'Backspace') handleKey('Back');
            else {
                const key = e.key;
                const hKey = convertToHangul(key);
                if (hKey) handleKey(hKey);
            }
        }

        function convertToHangul(k) {
            // Simplified qwerty to jamo mapping
            const map = {
                'q':'ㅂ', 'w':'ㅈ', 'e':'ㄷ', 'r':'ㄱ', 't':'ㅅ', 'y':'ㅛ', 'u':'ㅕ', 'i':'ㅑ', 'o':'ㅐ', 'p':'ㅔ',
                'a':'ㅁ', 's':'ㄴ', 'd':'ㅇ', 'f':'ㄹ', 'g':'ㅎ', 'h':'ㅗ', 'j':'ㅓ', 'k':'ㅏ', 'l':'ㅣ',
                'z':'ㅋ', 'x':'ㅌ', 'c':'ㅊ', 'v':'ㅍ', 'b':'ㅠ', 'n':'ㅜ', 'm':'ㅡ'
            };
            return map[k.toLowerCase()] || null;
        }

        function handleKey(key) {
            if (gameOver) return;

            if (key === 'Enter') {
                if (currentGuess.length === 5) {
                    submitGuess();
                } else {
                    showMessage("5글자를 채워주세요.");
                }
            } else if (key === 'Back') {
                if (currentGuess.length > 0) {
                    currentGuess.pop();
                    updateBoard();
                }
            } else if (currentGuess.length < 5) {
                // Ensure the key is a jamo
                if (key.length === 1) {
                    currentGuess.push(key);
                    showMessage("");
                    updateBoard();
                }
            }
        }

        function updateBoard() {
            const rowIdx = guesses.length;
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${rowIdx}-${i}`);
                tile.innerText = currentGuess[i] || "";
            }
        }

        function submitGuess() {
            const rowIdx = guesses.length;
            const guess = [...currentGuess];
            const guessKey = guess.join('');

            if (!validGuessJamos.has(guessKey)) {
                showMessage("사전에 없는 단어입니다.");
                return;
            }

            const result = new Array(5).fill('absent');
            
            const targetCopy = [...targetJamos];
            const guessCopy = [...guess];

            // First pass: Find correct (Green)
            for (let i = 0; i < 5; i++) {
                if (guess[i] === targetJamos[i]) {
                    result[i] = 'correct';
                    targetCopy[i] = null;
                    guessCopy[i] = null;
                }
            }

            // Second pass: Find present (Orange)
            for (let i = 0; i < 5; i++) {
                if (guessCopy[i] === null) continue;
                const idx = targetCopy.indexOf(guessCopy[i]);
                if (idx !== -1) {
                    result[i] = 'present';
                    targetCopy[idx] = null;
                }
            }

            // Animate and update UI
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${rowIdx}-${i}`);
                tile.dataset.state = result[i];
            }

            guesses.push(guess);
            currentGuess = [];

            if (result.every(r => r === 'correct')) {
                showMessage("축하합니다! 정답입니다!");
                gameOver = true;
            } else if (guesses.length === 5) {
                showMessage("실패했습니다. 정답은: " + targetWord);
                gameOver = true;
            }
        }

        function showMessage(msg) {
            messageElement.innerText = msg;
        }

        init();
    </script>
</body>
</html>
