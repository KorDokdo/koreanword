<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한글 단어 맞추기 게임</title>

  <style>
    body{
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background:#f2f2f2;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .game-box{
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
      width:350px;
      text-align:center;
    }

    h1{
      color:#333;
    }

    .hint{
      font-size:24px;
      margin:20px 0;
      color:#444;
      font-weight: bold;
      background: #eef;
      padding: 10px;
      border-radius: 8px;
    }

    input{
      width:80%;
      padding:12px;
      font-size:18px;
      border:2px solid #ddd;
      border-radius:8px;
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: #4CAF50;
    }

    button{
      margin-top:15px;
      padding:10px 20px;
      font-size:16px;
      border:none;
      border-radius:8px;
      background:#4CAF50;
      color:white;
      cursor:pointer;
      transition: background 0.3s;
    }

    button:hover{
      background:#45a049;
    }

    .result{
      margin-top:20px;
      font-size:20px;
      font-weight:bold;
      height: 24px;
    }

    .score{
      margin-top:15px;
      font-size:18px;
      color:#222;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }
  </style>
</head>

<body>

  <div class="game-box">
    <h1>한글 단어 맞추기</h1>

    <div class="hint" id="hint">단어 목록을 불러오는 중...</div>

    <input type="text" id="answer" placeholder="정답 입력" onkeyup="if(window.event.keyCode==13){checkAnswer()}">

    <br>

    <button onclick="checkAnswer()">정답 확인</button>

    <div class="result" id="result"></div>

    <div class="score" id="score">점수 : 0</div>
  </div>

<script>

let wordList = [];
let words = [];
let current = 0;
let score = 0;

// 한글 초성 추출 함수
function getChoseong(word) {
  const choseongList = [
    "ㄱ", "ㄲ", "ㄴ", "ㄷ", "ㄸ", "ㄹ", "ㅁ", "ㅂ", "ㅃ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅉ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"
  ];
  let result = "";
  for (let i = 0; i < word.length; i++) {
    const code = word.charCodeAt(i) - 44032;
    if (code >= 0 && code <= 11171) {
      result += choseongList[Math.floor(code / 588)];
    } else {
      result += word.charAt(i);
    }
  }
  return result;
}

// 외부 단어 데이터 불러오기 (1000개 공통 단어)
async function fetchWords() {
  try {
    const response = await fetch('https://raw.githubusercontent.com/SMenigat/thousand-most-common-words/master/words/ko.json');
    const data = await response.json();
    
    // 유효한 단어만 필터링 (2글자 이상, 한글만 포함)
    wordList = data.words
      .map(item => item.targetWord)
      .filter(word => word.length >= 2 && /^[가-힣]+$/.test(word));
    
    if (wordList.length > 0) {
      initGame();
    } else {
      throw new Error("No valid words found");
    }
  } catch (error) {
    console.error('Error fetching words:', error);
    document.getElementById("hint").innerText = "단어를 불러오지 못했습니다. 기본 단어로 시작합니다.";
    
    // 폴백 단어 리스트
    wordList = ["사과", "바나나", "학교", "컴퓨터", "우정", "하늘", "바다", "사랑", "가족", "노래"];
    initGame();
  }
}

// 게임 초기화 및 단어 셔플
function initGame() {
  words = wordList
    .map(word => ({ word, hint: getChoseong(word) }))
    .sort(() => Math.random() - 0.5);
    
  current = 0;
  score = 0;
  updateScore();
  loadQuestion();
}

function loadQuestion() {
  if (current < words.length) {
    document.getElementById("hint").innerText = "초성: " + words[current].hint;
    document.getElementById("answer").value = "";
    document.getElementById("answer").focus();
    document.getElementById("result").innerText = "";
  } else {
    alert("모든 문제를 풀었습니다! 최종 점수: " + score);
    initGame();
  }
}

function updateScore() {
  document.getElementById("score").innerText = "점수 : " + score;
}

function checkAnswer() {
  const input = document.getElementById("answer").value.trim();
  if (!input) return;

  const correct = words[current].word;

  if (input === correct) {
    score += 10;
    document.getElementById("result").innerText = "정답입니다! 🎉";
    document.getElementById("result").style.color = "green";
  } else {
    document.getElementById("result").innerText = "틀렸습니다! 정답: " + correct;
    document.getElementById("result").style.color = "red";
  }

  updateScore();
  current++;

  setTimeout(() => {
    loadQuestion();
  }, 1200);
}

// 실행
fetchWords();

</script>

</body>
</html>
